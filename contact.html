<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us - Ace Horizon</title>
  <link rel="stylesheet" href="contact.css">
</head>
<body class="contact-page">
  <div class="contact-container">
    <!-- Page Title -->
    <h1>CONTACT US</h1>
    <p class="subtitle">
      Submit questions or comments to Investor Relations below:
    </p>

    <!-- Contact Form -->
    <form action="contact.php" method="POST" class="contact-form">
      <input type="text" name="name" placeholder="Name" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="text" name="subject" placeholder="Subject" required>
      <textarea name="comments" placeholder="Comments" required></textarea>
      <button type="submit">Submit</button>
    </form>

    <!-- Connect With Us -->
    <div class="connect-section">
      <h2>Connect With Us</h2>
      <img src="Ace Horizon copy.png" alt="Ace Horizon Logo" class="logo">
      <div class="social-icons">
        <img src="Socmed.png" alt="Social Media Icons" class="socmed">
      </div>
    </div>

    <!-- Home Button -->
    <div class="home-btn-wrapper">
      <a href="home.html" class="home-btn">Return to Home</a>
    </div>
  </div>
</body>
</html>
